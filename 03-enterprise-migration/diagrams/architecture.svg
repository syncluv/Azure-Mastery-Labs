<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="onpremGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="devopsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005BA1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#F8FAFC"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A5F">Lab 03: Enterprise Migration Architecture</text>
  
  <!-- On-Premises Section -->
  <rect x="30" y="70" width="350" height="380" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="70" width="350" height="40" rx="10" fill="url(#onpremGrad)"/>
  <text x="205" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ON-PREMISES (Hyper-V)</text>
  
  <!-- On-Prem VMs -->
  <!-- VM-WEB-01 -->
  <rect x="50" y="125" width="145" height="70" rx="5" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <text x="122" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0078D4">VM-WEB-01</text>
  <text x="122" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">IIS + ASP.NET</text>
  <text x="122" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">192.168.2.41</text>
  
  <!-- VM-SQL-01 -->
  <rect x="215" y="125" width="145" height="70" rx="5" fill="#FFFFFF" stroke="#DC3545" stroke-width="2"/>
  <text x="287" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#DC3545">VM-SQL-01</text>
  <text x="287" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">SQL Server 2019</text>
  <text x="287" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">192.168.2.42</text>
  
  <!-- VM-FILE-01 -->
  <rect x="50" y="210" width="145" height="70" rx="5" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="122" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#28A745">VM-FILE-01</text>
  <text x="122" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">File Server (SMB)</text>
  <text x="122" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">192.168.2.43</text>
  
  <!-- VM-API-01 -->
  <rect x="215" y="210" width="145" height="70" rx="5" fill="#FFFFFF" stroke="#FD7E14" stroke-width="2"/>
  <text x="287" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FD7E14">VM-API-01</text>
  <text x="287" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Node.js + Express</text>
  <text x="287" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">192.168.2.44</text>
  
  <!-- Network Switch -->
  <rect x="120" y="300" width="170" height="35" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1"/>
  <text x="205" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4B5563">LabSwitch (External)</text>
  
  <!-- Connection lines to switch -->
  <line x1="122" y1="195" x2="160" y2="300" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4"/>
  <line x1="287" y1="195" x2="250" y2="300" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4"/>
  <line x1="122" y1="280" x2="160" y2="300" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4"/>
  <line x1="287" y1="280" x2="250" y2="300" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Migration Tools Box -->
  <rect x="50" y="355" width="310" height="80" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="205" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">Migration Tools</text>
  <text x="205" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">• AzCopy (File Transfer)</text>
  <text x="205" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">• SSMS (Database Export)</text>
  <text x="205" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure DevOps (CI/CD)</text>

  <!-- Migration Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
  </defs>
  
  <!-- Arrow 1: Web -->
  <line x1="380" y1="160" x2="460" y2="160" stroke="#0078D4" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="420" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0078D4">Wave 3</text>
  
  <!-- Arrow 2: SQL -->
  <line x1="380" y1="200" x2="460" y2="200" stroke="#DC3545" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="420" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#DC3545">Wave 2</text>
  
  <!-- Arrow 3: File -->
  <line x1="380" y1="245" x2="460" y2="340" stroke="#28A745" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#28A745">Wave 1</text>
  
  <!-- Arrow 4: API -->
  <line x1="380" y1="280" x2="460" y2="280" stroke="#FD7E14" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="420" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FD7E14">Wave 4</text>

  <!-- Azure Section -->
  <rect x="470" y="70" width="400" height="380" rx="10" fill="#EBF5FF" stroke="#0078D4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="70" width="400" height="40" rx="10" fill="url(#azureGrad)"/>
  <text x="670" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">AZURE (rg-lab03-migration)</text>
  
  <!-- VNet Box -->
  <rect x="485" y="120" width="370" height="245" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5"/>
  <text x="670" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E40AF">vnet-corp-prod (10.0.0.0/16)</text>
  
  <!-- App Service -->
  <rect x="500" y="150" width="110" height="60" rx="5" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <text x="555" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078D4">App Service</text>
  <text x="555" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">app-lab03-web</text>
  <text x="555" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">snet-web</text>
  
  <!-- Azure SQL -->
  <rect x="625" y="150" width="110" height="60" rx="5" fill="#FFFFFF" stroke="#DC3545" stroke-width="2"/>
  <text x="680" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#DC3545">Azure SQL</text>
  <text x="680" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">corpintranet</text>
  <text x="680" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">snet-data</text>
  
  <!-- Azure VM -->
  <rect x="500" y="225" width="110" height="60" rx="5" fill="#FFFFFF" stroke="#FD7E14" stroke-width="2"/>
  <text x="555" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FD7E14">Azure VM</text>
  <text x="555" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">vm-api-azure</text>
  <text x="555" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">snet-api</text>
  
  <!-- Azure Files -->
  <rect x="625" y="225" width="110" height="60" rx="5" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="680" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#28A745">Azure Files</text>
  <text x="680" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">companyfiles</text>
  <text x="680" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">snet-storage</text>
  
  <!-- NSGs -->
  <rect x="500" y="300" width="235" height="55" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="617" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#B91C1C">Network Security Groups</text>
  <text x="617" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">nsg-web | nsg-data | nsg-api</text>
  
  <!-- Storage Account -->
  <rect x="750" y="150" width="105" height="135" rx="5" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="802" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#10B981">Storage</text>
  <text x="802" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#10B981">Account</text>
  <text x="802" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">stlab03migrate</text>
  <line x1="760" y1="225" x2="845" y2="225" stroke="#E5E7EB" stroke-width="1"/>
  <text x="802" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">📁 companyfiles</text>
  <text x="802" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">├── Finance</text>
  <text x="802" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">├── HR</text>

  <!-- Azure DevOps Section -->
  <rect x="470" y="375" width="400" height="75" rx="5" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
  <text x="670" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338CA">Azure DevOps CI/CD</text>
  
  <!-- Pipeline stages -->
  <rect x="490" y="405" width="80" height="35" rx="3" fill="#FFFFFF" stroke="#6366F1" stroke-width="1"/>
  <text x="530" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4338CA">Azure Repos</text>
  
  <text x="583" y="422" font-family="Arial, sans-serif" font-size="16" fill="#6366F1">→</text>
  
  <rect x="595" y="405" width="80" height="35" rx="3" fill="#FFFFFF" stroke="#6366F1" stroke-width="1"/>
  <text x="635" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4338CA">Build</text>
  
  <text x="688" y="422" font-family="Arial, sans-serif" font-size="16" fill="#6366F1">→</text>
  
  <rect x="700" y="405" width="80" height="35" rx="3" fill="#FFFFFF" stroke="#6366F1" stroke-width="1"/>
  <text x="740" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4338CA">Deploy</text>
  
  <text x="793" y="422" font-family="Arial, sans-serif" font-size="16" fill="#6366F1">→</text>
  
  <rect x="805" y="405" width="55" height="35" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="832" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#065F46">Live! ✓</text>

  <!-- Legend -->
  <rect x="890" y="70" width="280" height="380" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="1030" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1F2937">Legend</text>
  
  <!-- Migration Waves -->
  <text x="910" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Migration Waves</text>
  
  <rect x="910" y="135" width="20" height="3" fill="#28A745"/>
  <text x="940" y="140" font-family="Arial, sans-serif" font-size="10" fill="#666">Wave 1: File Server → Azure Files</text>
  
  <rect x="910" y="155" width="20" height="3" fill="#DC3545"/>
  <text x="940" y="160" font-family="Arial, sans-serif" font-size="10" fill="#666">Wave 2: SQL → Azure SQL DB</text>
  
  <rect x="910" y="175" width="20" height="3" fill="#0078D4"/>
  <text x="940" y="180" font-family="Arial, sans-serif" font-size="10" fill="#666">Wave 3: IIS → App Service</text>
  
  <rect x="910" y="195" width="20" height="3" fill="#FD7E14"/>
  <text x="940" y="200" font-family="Arial, sans-serif" font-size="10" fill="#666">Wave 4: Node.js → Azure VM</text>
  
  <!-- Technologies -->
  <text x="910" y="230" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Technologies</text>
  
  <text x="910" y="250" font-family="Arial, sans-serif" font-size="10" fill="#666">• Hyper-V (On-Prem Simulation)</text>
  <text x="910" y="267" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure App Service (.NET)</text>
  <text x="910" y="284" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure SQL Database</text>
  <text x="910" y="301" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure Files (SMB)</text>
  <text x="910" y="318" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure VM (Ubuntu + Node.js)</text>
  <text x="910" y="335" font-family="Arial, sans-serif" font-size="10" fill="#666">• Azure DevOps Pipelines</text>
  
  <!-- Tools -->
  <text x="910" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Tools Used</text>
  <text x="910" y="385" font-family="Arial, sans-serif" font-size="10" fill="#666">• AzCopy, SSMS, Azure CLI</text>
  <text x="910" y="402" font-family="Arial, sans-serif" font-size="10" fill="#666">• Self-hosted Pipeline Agent</text>
  <text x="910" y="419" font-family="Arial, sans-serif" font-size="10" fill="#666">• PM2 Process Manager</text>
  <text x="910" y="436" font-family="Arial, sans-serif" font-size="10" fill="#666">• PowerShell / Bash</text>

  <!-- Footer -->
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Azure Mastery Labs - Lab 03: Enterprise Migration</text>
  <text x="600" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF">github.com/syncluv/Azure-Mastery-Labs</text>
</svg>
